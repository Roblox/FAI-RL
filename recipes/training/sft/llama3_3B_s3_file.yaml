# Model Configuration
model:
  base_model_name: "meta-llama/Llama-3.2-3B-Instruct"
  torch_dtype: "bfloat16"
  low_cpu_mem_usage: true
  load_in_8bit: false
  load_in_4bit: false
  use_flash_attention: false

  # LoRA configuration
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_bias: "none"

# Data Configuration
data:
  datasets:
    # S3 dataset loading: set name to an s3:// URI ending in .jsonl, .json, .csv, or .parquet.
    # boto3 credentials are resolved from the environment (IAM role, AWS_ACCESS_KEY_ID, etc.).
    # Expected JSONL schema: {"prompt": "...", "response": "..."}
    - name: "s3://your-bucket/datasets/train.jsonl"   # S3 URI to the dataset file (required)
      dataset_columns: ["prompt", "response"]          # Columns to keep
      s3_region: null                                  # AWS region override (null = use AWS_DEFAULT_REGION)
      s3_endpoint_url: null                            # Custom S3-compatible endpoint (null = AWS S3)

  max_length: 2048
  max_prompt_length: 1024
  remove_unused_columns: false

  system_prompt: |
    {prompt}

# Training Configuration
training:
  algorithm: "sft"
  output_dir: "models/llama3-3B-inst-sft-s3-lora-v1"

  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  num_train_epochs: 1
  max_steps: -1
  warmup_steps: 100

  logging_steps: 5
  save_steps: 50
  eval_steps: 50

  bf16: true
  fp16: false
  gradient_checkpointing: true

  dataloader_num_workers: 0
  dataloader_pin_memory: false
  dataloader_drop_last: true

# Weights & Biases Integration
wandb:
  enabled: false
  project: "your-project"
  entity: "your-wandb-entity"
  name: "Llama-3.2-3B-Inst-LoRA-SFT-s3"
  tags: ["SFT", "llama3", "3B-Inst", "LoRA", "s3"]
  api_key: null
  base_url: "https://api.wandb.ai"

# S3 Checkpoint Upload
s3:
  enabled: false
  bucket: "your-s3-bucket"
  prefix: "checkpoints/llama3-3B-inst-sft-s3-lora-v1"
  region: null
  endpoint_url: null
  upload_checkpoints: true
  upload_final_model: true
  delete_local_after_upload: false
