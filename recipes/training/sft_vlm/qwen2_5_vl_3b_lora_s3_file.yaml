# Multimodal (image + text) SFT recipe that loads its dataset file from S3.
#
# Identical to qwen2_5_vl_3b_lora.yaml except the dataset is read from an
# s3:// URI instead of a local .jsonl. The file is downloaded to a temp path at
# startup, loaded into the HuggingFace Arrow cache, then deleted. Image values
# inside each row are still HTTP(S) URLs / local paths fetched at load time.
model:
  base_model_name: "Qwen/Qwen2.5-VL-3B-Instruct"
  torch_dtype: "bfloat16"
  low_cpu_mem_usage: true
  load_in_4bit: false
  use_flash_attention: false

  freeze_vision_tower: true

  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  lora_bias: "none"

data:
  datasets:
    # S3 dataset loading: set name to an s3:// URI ending in .jsonl/.json/.csv/.parquet.
    # boto3 credentials resolve from the environment (IAM role, AWS_ACCESS_KEY_ID, etc.).
    # Expected JSONL schema: {"image_url": "...", "question": "...", "response": "..."}
    # (the same schema as recipes/training/sft_vlm/example_data.jsonl).
    - name: "s3://your-bucket/datasets/vlm_train.jsonl"  # S3 URI to the dataset file (required)
      image_column: "image_url"
      question_column: "question"
      response_column: "response"
      s3_region: null          # AWS region override (null = use AWS_DEFAULT_REGION)
      s3_endpoint_url: null     # Custom S3-compatible endpoint (null = AWS S3)

  image_cache_dir: "data/vlm_image_cache"
  image_fetch_timeout: 15
  image_fetch_retries: 3
  max_image_pixels: 262144         # ~0.25MP keeps the vision-token count bounded

  system_prompt: "You are a helpful multimodal assistant. Answer based on the image."

training:
  algorithm: "sft_vlm"
  output_dir: "models/qwen2.5-vl-3b-sft-s3-lora"

  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  num_train_epochs: 1
  max_steps: -1
  warmup_steps: 0

  logging_steps: 1
  save_steps: 50
  eval_steps: 50

  bf16: true
  fp16: false
  gradient_checkpointing: true

  dataloader_num_workers: 0
  dataloader_pin_memory: false
  dataloader_drop_last: false

wandb:
  enabled: false

s3:
  enabled: false
