# Model Configuration
# Defines the base model and its loading parameters
model:
  base_model_name: "Qwen/Qwen3-30B-A3B-Instruct-2507"    # HuggingFace model name or local path
  torch_dtype: "bfloat16"                                  # Data type for model weights
  low_cpu_mem_usage: true                                  # Reduce CPU memory usage during model loading
  load_in_8bit: false                                      # Enable 8-bit quantization
  load_in_4bit: false                                      # Enable 4-bit quantization
  use_flash_attention: true                                # Use Flash Attention for faster training (if supported)

  # LoRA configuration (for parameter-efficient fine-tuning)
  use_lora: true                                           # Enable LoRA
  lora_r: 16                                               # LoRA rank
  lora_alpha: 32                                           # LoRA alpha scaling factor (typically 2x rank)
  lora_dropout: 0.05                                       # LoRA dropout rate
  lora_target_modules:                                     # Target modules for LoRA
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_bias: "none"                                        # Bias handling: "none", "all", or "lora_only"

# Data Configuration
# Specifies datasets and preprocessing settings
data:
  datasets:
    - name: "your-org/your-dataset"                          # HuggingFace dataset name/path
      split: "train"                                        # Dataset split to use
      text_column: "text"                                   # Column name containing raw text for CPT

  # Text processing settings
  max_length: 4096                                          # 4x increase: longer sequences drive higher compute utilization
  remove_unused_columns: false                              # Keep all dataset columns
  dataset_num_proc: 4                                       # Parallelize dataset tokenization across CPUs

# Training Configuration
# Controls the training process and optimization settings
training:
  algorithm: "cpt"                                          # Training algorithm: cpt, sft, dpo, ppo, grpo, gspo
  output_dir: "models/qwen3-30B-A3B-cpt-lora-v1"           # Directory to save trained model and checkpoints

  # Core training hyperparameters
  per_device_train_batch_size: 4                            # 4x increase — ZeRO-3 optimizer sharding frees memory
  gradient_accumulation_steps: 2                            # effective batch = 4 × 2 × 8 GPUs = 64
  learning_rate: 1.0e-4                                     # Learning rate (1e-4 for LoRA)
  num_train_epochs: 1                                       # Number of complete passes through the dataset
  max_steps: 600                                            # Maximum number of training steps (-1 = train for num_train_epochs)
  warmup_steps: 100                                         # Linear warmup steps for learning rate scheduler

  # Logging and checkpointing
  logging_steps: 5                                          # Log training metrics every N steps
  save_steps: 100                                           # Save model checkpoint every N steps
  eval_steps: 50                                            # Evaluate model every N steps

  # Memory and precision optimization
  bf16: true                                                # Use bfloat16 precision (recommended for modern GPUs)
  fp16: false                                               # Use float16 precision (alternative to bf16)
  gradient_checkpointing: true                              # Trade compute for memory

  # MoE compatibility
  # NOTE: ddp_find_unused_parameters only affects torch DDP; it is a no-op
  # under DeepSpeed ZeRO-3 (what the launcher selects on CUDA). Kept true
  # as a safety net for the torchrun fallback. Under ZeRO-3 the equivalent
  # MoE-safety knobs live in the deepspeed config (bucket sizing + keeping
  # expert params off CPU). See docs/troubleshooting/distributed-hangs.md.
  ddp_find_unused_parameters: true

  # Data loading — overlap CPU preprocessing with GPU compute
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  dataloader_drop_last: true                                # Drop last incomplete batch

  deepspeed_config: "configs/deepspeed/zero3_config_gpu8_b200.json"
  debug_distributed: true  

# Weights & Biases Integration
# Optional experiment tracking and monitoring
wandb:
  enabled: false                                            # Enable W&B logging
  project: "your-project"                                             # W&B project name
  entity: "your-wandb-entity"                                      # W&B username or team name
  name: "Qwen3-30B-A3B-CPT-LoRA"                            # Experiment name in W&B
  tags: ["CPT", "qwen3", "30B-A3B", "MoE", "LoRA"]          # Tags for organizing experiments
  api_key: null                                             # W&B API key (null = use WANDB_API_KEY env var or prior `wandb login`)
  base_url: "https://api.wandb.ai"                        # W&B base URL (null = use WANDB_BASE_URL env var)

# S3 Checkpoint Upload
# Automatically uploads checkpoints and the final model to S3
s3:
  enabled: false                                         # Enable S3 checkpoint upload
  bucket: "your-s3-bucket"                               # S3 bucket name
  prefix: "your-prefix/qwen3-30B-inst-cpt-lora"     # S3 key prefix (folder path inside bucket)
  region: null                                           # AWS region (null = use AWS_DEFAULT_REGION env var or boto3 default)
  endpoint_url: null                                     # Custom S3-compatible endpoint (e.g. MinIO). null = AWS S3
  upload_checkpoints: true                               # Upload intermediate checkpoints (at every save_steps)
  upload_final_model: true                               # Upload the final model at end of training
  delete_local_after_upload: false                       # Delete local checkpoint files after successful upload
